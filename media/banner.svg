  <text x="400" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)">Awesome AI Coding Agents</text>
  <text x="400" y="130" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#a0a0b8">A curated list of AI-powered tools that help developers write, debug, and ship code faster</text>
  <text x="400" y="170" text-anchor="middle" font-family="monospace" font-size="14" fill="#6c6c80">&lt;/&gt; agents &bull; IDEs &bull; extensions &bull; platforms &bull; orchestrators</text>
